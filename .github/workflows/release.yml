name: Release

# Publishes to PyPI when a version tag is pushed (e.g. `git tag v0.3.0 && git push --tags`).
# Uses PyPI Trusted Publishing (OIDC) — no API token is stored in the repo.
# One-time setup is required on PyPI; see RELEASING.md.

on:
  push:
    tags: ["v*.*.*"]

jobs:
  pypi-publish:
    name: Build & publish to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/ds-msp
    permissions:
      id-token: write        # required for trusted publishing (OIDC)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Check metadata
        run: |
          python -m pip install --upgrade twine
          twine check dist/*
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
