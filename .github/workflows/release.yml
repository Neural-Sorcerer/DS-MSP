name: Release

# Release automation via release-please (Conventional Commits → versions):
#   1. On every push to main, release-please maintains a "release PR" that bumps the
#      version and updates CHANGELOG.md from the commits since the last release.
#   2. Merging that PR creates the git tag (vX.Y.Z) and a GitHub Release.
#   3. This run then builds and publishes to PyPI via Trusted Publishing (OIDC) —
#      no API token is stored anywhere. See RELEASING.md.
#
# Why the publish lives here (not on a tag-push trigger): tags created by the
# default GITHUB_TOKEN do not trigger other workflows, so the publish is gated on
# release-please's `release_created` output within the same workflow run.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Maintain release PR / cut release
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  pypi-publish:
    name: Build & publish to PyPI
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/ds-msp
    permissions:
      id-token: write        # required for trusted publishing (OIDC)
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Check metadata
        run: |
          python -m pip install --upgrade twine
          twine check dist/*
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
